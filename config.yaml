source: D:\Camara\a6400\
output: D:\Camara\OrganizacionSemantica
operation: copy
categories:
  - nature
  - birds
  - street photography
  - family
  - portraits
  - architecture
  - food
  - events
  - uncategorized

ollama:
  url: http://localhost:11434
  model: gemma4
  timeout_seconds: 120

classification_prompt: |
  Describe brevemente la imagen y luego, usando esa descripción, elige
  exactamente una categoría de la lista:
  {categories}

  Tu salida debe incluir categoría y confianza.

classification:
  min_confidence: 0.85
  fallback_category: uncategorized
  require_confidence_format: true

preprocessing:
  max_side: 1024
  jpeg_quality: 85
