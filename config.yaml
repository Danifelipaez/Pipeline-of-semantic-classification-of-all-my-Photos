source: D:\Camara\a6400\
output: D:\Camara\OrganizacionSemantica
operation: copy
categories:
  - nature
  - birds
  - street photography
  - family
  - portraits
  - architecture
  - food
  - events
  - uncategorized

ollama:
  url: http://localhost:11434
  model: gemma4
  timeout_seconds: 180

classification_prompt: |
  Describe brevemente la imagen y luego, usando esa descripción, elige
  exactamente una categoría de la lista:
  {categories}
  y calcula un porcentaje de confianza (0-100) para esa categoría, basado en la descripción.
  Responde en el formato: categoria|porcentaje (ejemplo: "nature|98")

classification:
  min_confidence: 0.85
  fallback_category: uncategorized
  require_confidence_format: true
  workers_mode: auto
  num_workers: 2
  max_workers_cap: 6

preprocessing:
  max_side: 768
  jpeg_quality: 80
